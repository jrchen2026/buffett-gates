<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- ===== Left: wordmark ===== -->
  <g font-family="ui-monospace, SFMono-Regular, Consolas, 'Courier New', monospace">
    <text x="88" y="200" font-size="72" font-weight="700" fill="#e6edf3">buffett-gates</text>
    <rect x="90" y="228" width="360" height="6" fill="url(#gold)"/>
    <text x="88" y="292" font-size="30" fill="#e3b341" font-weight="600">The Assay Bench&#160;&#160;&#183;&#160;&#160;&#39564;&#37329;&#21488;</text>
    <text x="88" y="345" font-size="21" fill="#8b949e">One anchor, three gates, a bear, and a verdict &#8212;</text>
    <text x="88" y="378" font-size="21" fill="#8b949e">is this business, at this price, worth a bet?</text>

    <!-- gauge bars -->
    <g font-size="19" fill="#8b949e">
      <text x="88" y="452">anchor</text>
      <text x="230" y="452" fill="#e3b341">[########--]</text>
      <text x="88" y="488">moat</text>
      <text x="230" y="488" fill="#e3b341">[#########-]</text>
      <text x="88" y="524">circle</text>
      <text x="230" y="524" fill="#e3b341">[########--]</text>
      <text x="88" y="560">mr. market</text>
      <text x="230" y="560" fill="#e3b341">[##--------]</text>
    </g>
    <text x="88" y="606" font-size="17" fill="#6e7681">48 shareholder letters, 1977&#8211;2024 &#183; every gate traceable to the source</text>
  </g>

  <!-- ===== Right: four quadrants ===== -->
  <g transform="translate(760,90)">
    <!-- axes -->
    <line x1="210" y1="0" x2="210" y2="440" stroke="#30363d" stroke-width="2"/>
    <line x1="-10" y1="220" x2="430" y2="220" stroke="#30363d" stroke-width="2"/>

    <!-- quadrant cells -->
    <rect x="0" y="10" width="200" height="200" rx="10" fill="#e3b341" fill-opacity="0.13" stroke="#e3b341" stroke-width="2"/>
    <rect x="220" y="10" width="200" height="200" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="230" width="200" height="200" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <rect x="220" y="230" width="200" height="200" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>

    <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace" text-anchor="middle">
      <text x="100" y="95" font-size="26" font-weight="700" fill="#e3b341">GOLD</text>
      <text x="100" y="128" font-size="18" fill="#e3b341">&#40644;&#37329;&#26684; &#183; bet big</text>
      <text x="320" y="95" font-size="26" font-weight="700" fill="#e6edf3">WAIT</text>
      <text x="320" y="128" font-size="18" fill="#8b949e">&#31561;&#24453;&#26684; &#183; sit still</text>
      <text x="100" y="315" font-size="26" font-weight="700" fill="#e6edf3">BUTT</text>
      <text x="100" y="348" font-size="18" fill="#8b949e">&#28895;&#33922;&#26684; &#183; one puff</text>
      <text x="320" y="315" font-size="26" font-weight="700" fill="#f85149">NEVER</text>
      <text x="320" y="348" font-size="18" fill="#8b949e">&#25237;&#26426;&#26684; &#183; never</text>
    </g>

    <!-- axis labels -->
    <g font-family="ui-monospace, Consolas, monospace" font-size="15" fill="#6e7681">
      <text x="210" y="-14" text-anchor="middle">certainty &#8593;</text>
      <text x="-10" y="468">&#8592; discount</text>
    </g>

    <!-- marker star in WAIT (Costco-style) -->
    <circle cx="392" cy="60" r="9" fill="#e3b341"/>
    <text x="392" y="42" font-family="Consolas, monospace" font-size="14" fill="#e3b341" text-anchor="middle">*you are here</text>
  </g>
</svg>
